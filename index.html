<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Blue Drift 3D</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app"></div>

    <div id="start">
      <div class="panel">
        <h1>Blue Drift 3D</h1>
        <p>푸른 빛 하나가 오래 숨을 쉰다.<br />물은 아무것도 서두르지 않는다.</p>
        <button id="startButton">들어가기</button>
      </div>
    </div>

    <div id="hud">
      <div class="title">Blue Drift 3D</div>
      <div class="desc">드래그: 시야 회전 · 핀치/휠: 접근/후퇴 · 갓 터치: 발광 · 촉수 터치: 위치별 높 낮이 음향 및 광섬유 빛 반응</div>
    </div>


    <button id="settingsButton" aria-label="settings">⚙</button>
    <div id="settingsPanel" class="hidden">
      <div class="settingsHeader">
        <strong>설정</strong>
        <button id="closeSettings" aria-label="close">×</button>
      </div>

      <label class="row">
        <span>수중음</span>
        <input id="underwaterVolume" type="range" min="0" max="1" step="0.01" value="0.38" />
      </label>

      <label class="row toggle">
        <span>음악</span>
        <input id="musicToggle" type="checkbox" />
      </label>

      <label class="row">
        <span>음악 볼륨</span>
        <input id="musicVolume" type="range" min="0" max="1" step="0.01" value="0.28" />
      </label>

      <label class="row">
        <span>터치음</span>
        <input id="touchVolume" type="range" min="0" max="1" step="0.01" value="0.38" />
      </label>

      <div class="hint">
        갓을 톡 치면 몸 안쪽의 빛이 번지고, 촉수는 닿은 가닥마다 잠시 더 밝아집니다.
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
