<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>v0.9.2 Cherenkov Bioluminescence jellyfish</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app"></div>

    <div id="start">
      <div class="panel">
        <h1>Blue Drift 3D</h1>
        <p>검은 물은 소리를 삼키고,<br />푸른 해파리 하나가 오래 숨을 쉰다.<br />물은 아무것도 서두르지 않는다.</p>
        <button id="startButton">잠수하기</button>
      </div>
    </div>

    <div id="hud">
      <div class="title">Blue Drift · v0.9.2</div>
      <div class="desc">드래그: 시야 회전 · 핀치/휠: 접근/후퇴 · 갓 터치: 생물 같은 펌핑 · 촉수 문지르기: 가닥별 빛 반응</div>
    </div>


    <button id="settingsButton" aria-label="settings">⚙</button>
    <div id="settingsPanel" class="hidden">
      <div class="settingsHeader">
        <strong>설정</strong>
        <button id="closeSettings" aria-label="close">×</button>
      </div>

      <label class="row">
        <span>수중음</span>
        <input id="underwaterVolume" type="range" min="0" max="1" step="0.01" value="0.38" />
      </label>

      <label class="row toggle">
        <span>음악</span>
        <input id="musicToggle" type="checkbox" />
      </label>

      <label class="row">
        <span>음악 볼륨</span>
        <input id="musicVolume" type="range" min="0" max="1" step="0.01" value="0.28" />
      </label>

      <label class="row">
        <span>터치음</span>
        <input id="touchVolume" type="range" min="0" max="1" step="0.01" value="0.38" />
      </label>

      <div class="hint">
        갓을 톡 치면 빛이 물결처럼 번지고, 촉수 쪽을 문지르면 닿은 가닥들이 잠시 푸르게 깨어납니다.
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
