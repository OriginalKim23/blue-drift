<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Blue Drift v0.9.1</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app"></div>

    <div id="start">
      <div class="panel">
        <h1>Blue Drift 3D</h1>
        <p>검은 물속에 푸른 빛 하나가 천천히 떠오릅니다. 시야를 움직이고 소리를 조절하며, 깊은 물의 호흡을 바라보는 짧은 휴식용 시뮬레이션입니다.</p>
        <button id="startButton">잠수하기</button>
      </div>
    </div>

    <div id="hud">
      <div class="title">Blue Drift · v0.9.1</div>
      <div class="desc">드래그: 시야 회전 · 핀치/휠: 접근/후퇴 · 갓 터치: 느린 펌핑 · 촉수 문지르기: 몽환 신호음</div>
    </div>


    <button id="settingsButton" aria-label="settings">⚙</button>
    <div id="settingsPanel" class="hidden">
      <div class="settingsHeader">
        <strong>설정</strong>
        <button id="closeSettings" aria-label="close">×</button>
      </div>

      <label class="row">
        <span>수중음</span>
        <input id="underwaterVolume" type="range" min="0" max="1" step="0.01" value="0.38" />
      </label>

      <label class="row toggle">
        <span>음악</span>
        <input id="musicToggle" type="checkbox" />
      </label>

      <label class="row">
        <span>음악 볼륨</span>
        <input id="musicVolume" type="range" min="0" max="1" step="0.01" value="0.28" />
      </label>

      <label class="row">
        <span>터치음</span>
        <input id="touchVolume" type="range" min="0" max="1" step="0.01" value="0.38" />
      </label>

      <div class="hint">
        갓을 톡 치면 느리게 빛이 차오르고, 촉수 쪽을 문지르면 작은 몽환 신호음이 납니다.
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
